services:
  app:
    build: .
    ports:
      - "7860:7860"
    env_file:
      - .env                    # loads ANTHROPIC_API_KEY, FAL_KEY, REPLICATE_API_TOKEN
    environment:
      - VAH_DATA_DIR=/data
      - PYTHONUNBUFFERED=1
      - ANONYMIZED_TELEMETRY=false
    volumes:
      - ./data:/data            # persists DB, projects, brand kits (mirrors HF Spaces /data)
